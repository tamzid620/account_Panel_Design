<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AdminDashBoard</title>
    <!-- bootstrap CDN  -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <!-- font CDN  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <style>
    .dashboardBody {
      width: 95%;
      margin: auto;
    }
    .NSPD {
      margin-top: 20px;
      display: flex;
      justify-content: space-between;
    }
    .box-div {
      width: 18rem;
      background: linear-gradient(to right, #3bb890, #114070);
      color: white;
      border-radius: 5px;
    }
    .box-title {
      margin: auto;
      padding: 8px;
      background: linear-gradient(to left, #3bb890, #114070);
      border-top-left-radius: 5px;
      border-top-right-radius: 5px;
    }
    .box-text {
      margin: auto;
      width: 17rem;
      padding-top: 20px;
      padding-bottom: 20px;
      display: flex;
      justify-content: space-between;
      font-size: xx-large;
    }
    .icon {
      width: 60px;
    }
    .card-link {
      margin: auto;
      padding: 8px;
      background: linear-gradient(to left, #3bb890, #114070);
      border-bottom-left-radius: 5px;
      border-bottom-right-radius: 5px;
    }
  </style>
  <body class="dashboardBody">
    <!--<<<<<<<<< number status >>>>>>>>>> -->
    <div class="NSPD">
      <!-- card one  -->
      <div class="box-div">
        <h5 class="box-title">Income Today</h5>
        <p class="box-text">
          <span
            ><img class="icon" src="./assets/income.png" alt="" srcset=""
          /></span>
          <span>$6700</span>
        </p>
        <p href="#" class="card-link">view more...</p>
      </div>
      <!-- card two  -->
      <div class="box-div">
        <h5 class="box-title">Expense Today</h5>
        <p class="box-text">
          <span
            ><img class="icon" src="./assets/expenses.png" alt="" srcset=""
          /></span>
          <span>$600</span>
        </p>
        <p href="#" class="card-link">view more...</p>
      </div>
      <!-- card three  -->
      <div class="box-div">
        <h5 class="box-title">Monthly Income</h5>
        <p class="box-text">
          <span
            ><img class="icon" src="./assets/growth.png" alt="" srcset=""
          /></span>
          <span>$6700</span>
        </p>
        <p href="#" class="card-link">view more...</p>
      </div>
      <!-- card four  -->
      <div class="box-div">
        <h5 class="box-title">Monthly Expense</h5>
        <p class="box-text">
          <span
            ><img class="icon" src="./assets/expense-month.png" alt="" srcset=""
          /></span>
          <span>$6700</span>
        </p>
        <p href="#" class="card-link">view more...</p>
      </div>
    </div>
  </body>
</html>
